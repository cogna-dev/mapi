name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  moonbit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Pre-commit
        run: pre-commit run --all-files

      - name: Check
        run: moon check

      - name: Format
        run: moon fmt --check

      - name: Build
        run: moon build

      - name: Test
        run: moon test
